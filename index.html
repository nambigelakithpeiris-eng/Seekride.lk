<style>
    /* --- FONTS --- */
    .main-title {
        font-family: 'Orbitron', sans-serif; /* Back to Orbitron */
        text-transform: uppercase;
        letter-spacing: 8px;
        font-size: 2.2rem;
        color: #fff;
        margin: 0;
        text-shadow: 0 0 15px rgba(255, 212, 59, 0.6);
    }
    .script-subheading {
        font-family: 'Pinyon Script', cursive;
        font-size: 3rem;
        color: #fff;
        margin-top: -15px;
        display: block;
    }

    /* --- CARD STYLES --- */
    .card { 
        background: white; 
        padding: 30px; 
        border-radius: 20px; 
        box-shadow: 0 5px 15px rgba(0,0,0,0.05); 
        text-align: left;
        transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); /* Professional smooth transition */
        cursor: pointer;
        transform: scale(0.95); /* Slightly smaller by default to make the "pop" look better */
        opacity: 0.8;
        border: 2px solid transparent;
    }

    /* THE FIX: This class stays ON even when you stop scrolling */
    .card.active-focus {
        transform: scale(1.05);
        opacity: 1;
        box-shadow: 0 15px 35px rgba(0,0,0,0.12);
        border: 2px solid rgba(26, 115, 232, 0.3);
        z-index: 10;
    }

    @media (hover: hover) {
        .card:hover {
            transform: scale(1.05);
            opacity: 1;
        }
    }

    .grid { 
        display: flex; 
        flex-direction: column; 
        gap: 30px; 
        padding: 20px;
    }
</style>

<script>
    // THE NEW OBSERVER LOGIC
    // This "watches" which card is most visible in the center of the screen
    const options = {
        root: null,
        rootMargin: '-20% 0px -20% 0px', // Focuses on the middle 60% of the screen
        threshold: 0.5 
    };

    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                // Remove active class from all cards
                document.querySelectorAll('.card').forEach(c => c.classList.remove('active-focus'));
                // Add to the one currently in view
                entry.target.classList.add('active-focus');
            }
        });
    }, options);

    // Start watching each card
    document.querySelectorAll('.card').forEach(card => {
        observer.observe(card);
    });
</script>
