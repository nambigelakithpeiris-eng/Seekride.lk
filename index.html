<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SeekRide Bolgoda</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background:#0a0a0a;color:#fff;overflow-x:hidden;}
html{scroll-behavior:smooth;}

/* NAV */
.nav{
  position:fixed;
  width:100%;
  display:flex;
  justify-content:space-between;
  padding:15px 20px;
  z-index:1000;
  transition:0.3s;
}
.nav.scrolled{background:rgba(0,0,0,0.85);backdrop-filter:blur(10px);}
.logo{font-family:'Orbitron';letter-spacing:2px;}
.nav a{color:#fff;margin-left:10px;font-size:0.75rem;text-decoration:none;font-family:'Orbitron';}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  background:url('images/hero.jpg') center/cover no-repeat;
}
.hero h1{font-family:'Orbitron';font-size:3rem;}
.hero p{margin:10px 0 20px;font-size:0.9rem;}
.btn{
  background:#25D366;
  padding:14px 30px;
  border-radius:50px;
  border:none;
  color:#fff;
  font-weight:600;
}

/* SECTION */
.section{padding:60px 20px;text-align:center;}
.section h2{font-family:'Orbitron';margin-bottom:25px;color:#ff9f43;}

/* CARD */
.card{
  height:400px;
  border-radius:20px;
  margin:20px auto;
  max-width:400px;
  display:flex;
  align-items:flex-end;
  padding:20px;
  background-size:cover;
  background-position:center;

  transform:scale(0.9);
  opacity:0.5;
  transition:0.4s;
}
.card.active{transform:scale(1);opacity:1;}
.card::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(to top, rgba(0,0,0,0.9), transparent);
  border-radius:20px;
}
.card-content{position:relative;z-index:2;text-align:left;}
.card h3{font-family:'Orbitron';color:#ff9f43;}
.card p{font-size:0.85rem;}

/* GALLERY */
.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:10px;
}
.gallery img{width:100%;border-radius:10px;}

/* FOOTER */
footer{padding:30px;text-align:center;background:#000;font-size:0.8rem;opacity:0.6;}
</style>
</head>

<body>

<div class="nav">
  <div class="logo">SeekRide</div>
  <div>
    <a href="#stay">STAY</a>
    <a href="#pool">POOL</a>
    <a href="#boat">BOAT</a>
  </div>
</div>

<section class="hero">
  <h1>SeekRide</h1>
  <p>Luxury stay & party boat on Bolgoda Lake</p>
  <button class="btn" onclick="location.href='https://wa.me/94772199933'">Book Now</button>
</section>

<section class="section">
  <h2>Experience</h2>

  <div class="card" id="stay" data-images="images/room1.jpg,images/room2.jpg">
    <div class="card-content">
      <h3>Stay</h3>
      <p>Luxury lake view suites</p>
    </div>
  </div>

  <div class="card" id="pool" data-images="images/pool1.jpg,images/pool2.jpg">
    <div class="card-content">
      <h3>Pool</h3>
      <p>Crystal clear swimming pool</p>
    </div>
  </div>

  <div class="card" id="boat" data-images="images/boat1.jpg,images/boat2.jpg">
    <div class="card-content">
      <h3>Boat</h3>
      <p>Private double-deck party cruises</p>
    </div>
  </div>

</section>

<section class="section">
  <h2>Gallery</h2>
  <div class="gallery">
    <img src="images/room1.jpg">
    <img src="images/pool1.jpg">
    <img src="images/boat1.jpg">
  </div>
</section>

<footer>
  <p>Bandaragama, Sri Lanka</p>
  <p>© SeekRide</p>
</footer>

<script>
// NAVBAR EFFECT
window.addEventListener("scroll",()=>{
  document.querySelector(".nav")
    .classList.toggle("scrolled",window.scrollY>20);
});

// CARD FOCUS
const cards=document.querySelectorAll(".card");

const observer=new IntersectionObserver(entries=>{
  entries.forEach(entry=>{
    if(entry.isIntersecting){
      cards.forEach(c=>c.classList.remove("active"));
      entry.target.classList.add("active");
    }
  });
},{threshold:0.5});

cards.forEach(c=>observer.observe(c));

// IMAGE SLIDESHOW
cards.forEach(card=>{
  const imgs=card.dataset.images.split(",");
  let i=0;

  card.style.backgroundImage=`url(${imgs[0]})`;

  setInterval(()=>{
    i=(i+1)%imgs.length;
    card.style.backgroundImage=`url(${imgs[i]})`;
  },3000);
});
</script>

</body>
</html>
