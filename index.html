<style>
    /* ... keep your other styles ... */

    .card { 
        background: white; padding: 30px; border-radius: 20px; 
        box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: left;
        /* Slowed down the transition to make it feel expensive/smooth */
        transition: transform 0.5s ease-out, box-shadow 0.5s ease-out, border 0.5s ease;
        cursor: pointer;
        transform: scale(1);
        border: 1px solid transparent;
        position: relative;
    }

    /* PC Hover - only works if not on mobile */
    @media (hover: hover) {
        .card:hover {
            transform: scale(1.05) !important;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            z-index: 10;
        }
    }

    /* The "One Winner" class for mobile */
    .card.active-focus {
        transform: scale(1.08);
        box-shadow: 0 20px 40px rgba(26, 115, 232, 0.15);
        border: 1px solid rgba(26, 115, 232, 0.4);
        z-index: 5;
    }
</style>

<script>
    const cards = document.querySelectorAll('.card');
    let isScrolling;

    const handleScroll = () => {
        // Find the horizontal center line of the screen
        const viewportCenter = window.innerHeight / 2;
        
        let closestCard = null;
        let minDistance = Infinity;

        cards.forEach(card => {
            const rect = card.getBoundingClientRect();
            const cardCenter = rect.top + (rect.height / 2);
            const distanceToCenter = Math.abs(viewportCenter - cardCenter);

            if (distanceToCenter < minDistance) {
                minDistance = distanceToCenter;
                closestCard = card;
            }
        });

        // "Lock-on" Logic: Only switch if the card is reasonably close to center
        if (closestCard) {
            cards.forEach(c => c.classList.remove('active-focus'));
            closestCard.classList.add('active-focus');
        }
    };

    // This prevents the "flicker" by slightly throttling the scroll check
    window.addEventListener('scroll', () => {
        window.cancelAnimationFrame(isScrolling);
        isScrolling = window.requestAnimationFrame(handleScroll);
    }, { passive: true });

    // Initial check
    handleScroll();
</script>
